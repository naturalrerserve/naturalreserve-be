version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: natural-reserve-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: natural_reserve
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: natural-reserve-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@naturalreserve.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres

volumes:
  postgres_data:
  pgadmin_data:
